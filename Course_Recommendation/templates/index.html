<!DOCTYPE html>
<html>
<head>
<title>AI Course Recommender</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#eef2ff,#dbeafe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:50px;
width:75%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h1{
font-size:42px;
margin-bottom:35px;
}

form{
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

select,input{
width:70%;
padding:16px;
font-size:18px;
border:2px solid #6366f1;
border-radius:12px;
}

button{
background:#4f46e5;
color:white;
padding:15px 35px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#4338ca;
}
</style>

</head>
<body>

<div class="container">

<h1>🎓 Explainable Course Recommendation</h1>

<form action="/recommend" method="POST">

<select name="course">
<option value="">-- Select Existing Course --</option>

{% for course in courses %}
<option value="{{course}}">
{{course}}
</option>
{% endfor %}

</select>

<input
type="text"
name="keyword"
placeholder="Or search skills like Python, AI, Data Science"
/>

<button type="submit">
Get Recommendations
</button>

</form>

</div>

</body>
</html>
